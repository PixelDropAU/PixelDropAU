<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pixeldrop</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080808;
    --white: #f0ece3;
    --accent: #ff2d55;
    --accent2: #00e5ff;
  }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow-x: hidden;
  }

  /* subtle vignette — pure CSS, no moving parts */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.65) 100%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 24px 44px;
    width: 100%;
    max-width: 440px;
  }

  /* wordmark — completely static, no hover effects */
  .wordmark {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(72px, 20vw, 110px);
    letter-spacing: -2px;
    line-height: 0.85;
    text-align: center;
    color: var(--white);
    animation: fadeUp 0.6s ease both;
    user-select: none;
    pointer-events: none;
  }

  .wordmark span {
    display: block;
    color: var(--accent);
    font-size: 0.38em;
    letter-spacing: 8px;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    margin-top: 8px;
  }

  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
    margin: 28px 0 32px;
    opacity: 0;
    animation: fadeUp 0.6s 0.15s ease forwards;
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
  }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 22px;
    text-decoration: none;
    color: var(--white);
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.03);
    position: relative;
    overflow: hidden;
    transition: border-color 0.25s, background 0.25s, transform 0.2s;
    opacity: 0;
    animation: fadeUp 0.5s ease forwards;
  }

  .link-btn:nth-child(1) { animation-delay: 0.28s; }
  .link-btn:nth-child(2) { animation-delay: 0.40s; }
  .link-btn:nth-child(3) { animation-delay: 0.52s; }
  .link-btn:nth-child(4) { animation-delay: 0.64s; }

  /* shimmer on hover */
  .link-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
    transform: translateX(-100%);
    transition: transform 0.45s ease;
  }
  .link-btn:hover::before { transform: translateX(100%); }

  .link-btn:hover {
    border-color: var(--btn-color);
    background: rgba(255,255,255,0.05);
    transform: translateX(5px);
  }
  .link-btn:hover .arrow { transform: translateX(4px); opacity: 0.9; }

  /* left colour bar */
  .link-btn::after {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--btn-color);
  }

  .link-btn.insta    { --btn-color: #e1306c; }
  .link-btn.yt       { --btn-color: #ff2020; }
  .link-btn.tiktok   { --btn-color: #00e5ff; }
  .link-btn.linktree { --btn-color: #39e09b; }

  .icon { width: 26px; height: 26px; flex-shrink: 0; }

  .btn-text { flex: 1; }

  .label {
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 700;
    line-height: 1.3;
  }

  .sublabel {
    font-size: 10px;
    letter-spacing: 1px;
    opacity: 0.35;
    text-transform: uppercase;
    margin-top: 3px;
  }

  .arrow {
    font-size: 18px;
    opacity: 0.35;
    transition: transform 0.2s, opacity 0.2s;
  }

  .footer {
    margin-top: 38px;
    font-size: 10px;
    letter-spacing: 3px;
    opacity: 0;
    text-transform: uppercase;
    animation: fadeUp 0.5s 0.8s ease forwards;
    color: rgba(240,236,227,0.2);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="container">

  <div class="wordmark">

      <svg class="icon" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="8" r="3" stroke="#39e09b" stroke-width="2"/>
        <path d="M6 21v-2a6 6 0 0 1 12 0v2" stroke="#39e09b" stroke-width="2" stroke-linecap="round"/>

        <div class="label">Budget Finds &amp; Deals</div>

  </div>

  <div class="footer">pixeldrop_au &nbsp;·&nbsp; all links</div>

</div>

</body>
</html>
